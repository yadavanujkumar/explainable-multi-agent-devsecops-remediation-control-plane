apiVersion: apps/v1
kind: Deployment
metadata:
  name: devsecops-backend
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: devsecops-backend:latest
        ports:
        - containerPort: 8080
        env:
        - name: REDPANDA_BROKERS
          value: "redpanda.default.svc.cluster.local:9092"
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
